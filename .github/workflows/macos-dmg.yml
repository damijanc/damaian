name: Build macOS DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional app version for manual builds, for example 0.1.3"
        required: false
        type: string
  push:
    tags:
      - "v*"

concurrency:
  group: macos-dmg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Apple Silicon DMG
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Stamp release version
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${INPUT_VERSION}"
          if [[ -z "${version}" && "${REF_TYPE}" == "tag" ]]; then
            version="${REF_NAME#v}"
          fi
          if [[ -n "${version}" ]]; then
            npm run version:sync -- "${version}"
          else
            echo "No release version provided; using repository metadata version."
          fi

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/cargo-tauri
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Refresh Cargo lock for stamped version
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${INPUT_VERSION}"
          if [[ -z "${version}" && "${REF_TYPE}" == "tag" ]]; then
            version="${REF_NAME#v}"
          fi
          if [[ -n "${version}" ]]; then
            cargo update --workspace --offline
          else
            echo "No release version stamped; lockfile refresh not needed."
          fi

      - name: Install Tauri CLI
        run: |
          if ! command -v cargo-tauri >/dev/null 2>&1; then
            cargo install tauri-cli --version 2.11.4 --locked
          fi

      - name: Check desktop JavaScript
        run: node --check crates/desktop-shell/static/app.js

      - name: Run Node tests
        run: npm test

      - name: Run Rust tests
        run: cargo test --locked

      - name: Build DMG
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: npm run desktop:build

      - name: Verify macOS bundle
        run: |
          codesign --verify --deep --strict --verbose=4 target/release/bundle/macos/Damaian.app
          hdiutil verify target/release/bundle/dmg/*.dmg

      - name: Show bundle output
        run: |
          find target/release/bundle -maxdepth 3 -type f -print

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: Damaian-macOS-arm64-DMG
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v8
        with:
          name: Damaian-macOS-arm64-DMG
          path: release-artifacts

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          notes="Ad-hoc signed, not notarized macOS developer-preview DMG build for ${TAG_NAME}."
          if gh release view "${TAG_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" release-artifacts/*.dmg --repo "${GH_REPO}" --clobber
          else
            gh release create "${TAG_NAME}" release-artifacts/*.dmg \
              --repo "${GH_REPO}" \
              --title "${TAG_NAME}" \
              --notes "${notes}"
          fi
