name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: macos-dmg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Apple Silicon DMG
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-tauri
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Install Tauri CLI
        run: |
          if ! command -v cargo-tauri >/dev/null 2>&1; then
            cargo install tauri-cli --version 2.11.4 --locked
          fi

      - name: Check desktop JavaScript
        run: node --check crates/desktop-shell/static/app.js

      - name: Run Node tests
        run: npm test

      - name: Run Rust tests
        run: cargo test --locked

      - name: Build DMG
        run: npm run desktop:build

      - name: Show bundle output
        run: |
          find target/release/bundle -maxdepth 3 -type f -print

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Damaian-macOS-arm64-DMG
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v4
        with:
          name: Damaian-macOS-arm64-DMG
          path: release-artifacts

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          notes="Unsigned macOS developer-preview DMG build for ${TAG_NAME}."
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" release-artifacts/*.dmg --clobber
          else
            gh release create "${TAG_NAME}" release-artifacts/*.dmg \
              --title "${TAG_NAME}" \
              --notes "${notes}"
          fi
